strategy_name: "trend_following"
enabled: true
instruments: ["ES", "NQ"]
timeframe: "5min"
parameters:
  ema_fast: 20
  ema_slow: 50
  adx_period: 14
  adx_threshold: 20
  pullback_atr: 1.0
  stop_loss_atr: 1.2
  trailing_stop_atr: 1.8
  atr_period: 14
regime_filter:
  allowed_regimes: ["strong_trend_up", "strong_trend_down", "weak_trend"]
  blocked_regimes: ["ranging", "low_volatility"]
risk:
  max_risk_per_trade_pct: 0.75
  max_concurrent_positions: 1
