name: build-dukascopy-data

# Manual-only ingestion of Dukascopy XAUUSD candles via the
# dukascopy-node Node.js library (which handles Dukascopy's per-IP rate
# limiting). Two trigger modes:
#
#   workflow_dispatch                manual UI run with inputs
#   push to triggers/build-dukascopy.txt   auto-fires with default inputs;
#                                          lets the assistant re-run after
#                                          a fix without a manual click

on:
  push:
    paths:
      - ".github/workflows/triggers/build-dukascopy.txt"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Dukascopy symbol (e.g. XAUUSD)"
        required: true
        default: "XAUUSD"
      mode:
        description: "candles (default; uses dukascopy-node) | ticks_only (raw .bi5 only)"
        required: true
        default: "candles"
      years_back:
        description: "Years of history when start_date/end_date are blank"
        required: true
        default: "6"
      start_date:
        description: "UTC YYYY-MM-DD (optional; pairs with end_date)"
        required: false
        default: ""
      end_date:
        description: "UTC YYYY-MM-DD (optional; exclusive)"
        required: false
        default: ""
      workers:
        description: "Workers for the ticks_only Python downloader (ignored in candles mode)"
        required: true
        default: "6"
      commit_to_branch:
        description: "Push candles to this orphan branch (candles mode). Empty disables."
        required: false
        default: "data-dukascopy"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Resolve inputs once. workflow_dispatch sets github.event.inputs.*
      # but push triggers don't, so we apply defaults here and downstream
      # steps reference steps.inputs.outputs.*
      - name: Resolve inputs
        id: inputs
        env:
          IN_SYMBOL:    ${{ github.event.inputs.symbol }}
          IN_MODE:      ${{ github.event.inputs.mode }}
          IN_YB:        ${{ github.event.inputs.years_back }}
          IN_SD:        ${{ github.event.inputs.start_date }}
          IN_ED:        ${{ github.event.inputs.end_date }}
          IN_WORKERS:   ${{ github.event.inputs.workers }}
          IN_BRANCH:    ${{ github.event.inputs.commit_to_branch }}
        run: |
          set -e
          symbol="${IN_SYMBOL:-XAUUSD}"
          mode="${IN_MODE:-candles}"
          yb="${IN_YB:-6}"
          workers="${IN_WORKERS:-6}"
          # An explicitly-empty value from workflow_dispatch is still meaningful;
          # only fall back to the default when the variable is unset.
          if [ -z "${IN_BRANCH+x}" ]; then branch="data-dukascopy"; else branch="${IN_BRANCH:-data-dukascopy}"; fi
          if [ -n "$IN_SD" ] && [ -n "$IN_ED" ]; then
            start="$IN_SD"; end="$IN_ED"
            echo "Using explicit range: $start -> $end"
          else
            end="$(date -u +%Y-%m-%d)"
            start="$(date -u -d "${yb} years ago" +%Y-%m-%d)"
            echo "Using years_back=${yb}: $start -> $end"
          fi
          {
            echo "symbol=$symbol"
            echo "mode=$mode"
            echo "years_back=$yb"
            echo "workers=$workers"
            echo "branch=$branch"
            echo "start=$start"
            echo "end=$end"
          } >> "$GITHUB_OUTPUT"
          echo "resolved: symbol=$symbol mode=$mode years_back=$yb workers=$workers branch=$branch start=$start end=$end"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        if: ${{ steps.inputs.outputs.mode == 'candles' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow requests tqdm

      - name: Install dukascopy-node (npm)
        if: ${{ steps.inputs.outputs.mode == 'candles' }}
        run: |
          npm install -g dukascopy-node
          npx -y dukascopy-node --version || true

      - name: Run candles pipeline (dukascopy-node + resample)
        if: ${{ steps.inputs.outputs.mode == 'candles' }}
        env:
          SYMBOL: ${{ steps.inputs.outputs.symbol }}
          START:  ${{ steps.inputs.outputs.start }}
          END:    ${{ steps.inputs.outputs.end }}
        run: |
          mkdir -p output/dukascopy
          bash scripts/run_dukascopy_node.sh "$SYMBOL" "$START" "$END" output/dukascopy

      - name: Run ticks_only pipeline (Python downloader)
        if: ${{ steps.inputs.outputs.mode == 'ticks_only' }}
        env:
          SYMBOL:  ${{ steps.inputs.outputs.symbol }}
          WORKERS: ${{ steps.inputs.outputs.workers }}
          START:   ${{ steps.inputs.outputs.start }}
          END:     ${{ steps.inputs.outputs.end }}
        run: |
          python scripts/run_dukascopy_pipeline.py \
            --symbol "$SYMBOL" --output-dir output/dukascopy \
            --workers "$WORKERS" --ticks-only --keep-raw \
            --start-date "$START" --end-date "$END"

      - name: Tree of output/dukascopy
        if: always()
        env:
          SYMBOL: ${{ steps.inputs.outputs.symbol }}
        run: |
          echo "=== output/dukascopy contents (top 80) ==="
          find output/dukascopy -maxdepth 6 -type f -printf '%s\t%p\n' | sort | head -80
          echo "=== total size ==="
          du -sh output/dukascopy 2>/dev/null || true
          echo "=== manifest ==="
          if [ -f "output/dukascopy/${SYMBOL}/manifest.json" ]; then
            cat "output/dukascopy/${SYMBOL}/manifest.json"
          fi

      - name: Zip artifact (mode-aware)
        if: always()
        env:
          SYMBOL: ${{ steps.inputs.outputs.symbol }}
          MODE:   ${{ steps.inputs.outputs.mode }}
        run: |
          set -e
          if [ "$MODE" = "ticks_only" ]; then
            ZIP_NAME="${SYMBOL}_dukascopy_ticks.zip"
            (cd output/dukascopy && zip -r -q "../../${ZIP_NAME}" raw "${SYMBOL}/manifest.json" 2>/dev/null) || true
          else
            ZIP_NAME="${SYMBOL}_dukascopy_candles.zip"
            (cd output/dukascopy && zip -r -q "../../${ZIP_NAME}" "${SYMBOL}" 2>/dev/null) || true
          fi
          [ -f "${ZIP_NAME}" ] && ls -la "${ZIP_NAME}" || echo "no zip produced"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload main artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.inputs.outputs.symbol }}_dukascopy_${{ steps.inputs.outputs.mode }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: warn
          retention-days: 30

      - name: Upload manifest + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.inputs.outputs.symbol }}_dukascopy_${{ steps.inputs.outputs.mode }}_meta
          path: |
            output/dukascopy/${{ steps.inputs.outputs.symbol }}/manifest.json
            output/dukascopy/${{ steps.inputs.outputs.symbol }}/validation_report.json
            output/dukascopy/download_log.csv
          if-no-files-found: warn
          retention-days: 30

      - name: Force-push candles to sidecar branch
        # Push whatever candles landed even if the build hit partial failures
        # (per-year retry can leave gaps). The sidecar README documents this.
        if: ${{ always() && steps.inputs.outputs.mode == 'candles' && steps.inputs.outputs.branch != '' }}
        env:
          BRANCH: ${{ steps.inputs.outputs.branch }}
          SYMBOL: ${{ steps.inputs.outputs.symbol }}
          REPO:   ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ ! -d "output/dukascopy/${SYMBOL}" ]; then
            echo "no candles produced; skipping sidecar push"
            exit 0
          fi
          STAGE=/tmp/sidecar
          rm -rf "$STAGE"
          mkdir -p "$STAGE/data/dukascopy/candles"
          cp -r "output/dukascopy/${SYMBOL}" "$STAGE/data/dukascopy/candles/"
          find "$STAGE" -type f -name "${SYMBOL}_*.parquet" \
            ! -name "year=*" -size +95M -print -delete || true
          cat > "$STAGE/README.md" <<EOF
          # data-dukascopy (regenerable sidecar)

          This branch is force-replaced by the build-dukascopy-data
          GitHub Actions workflow. It is not a code branch — do not
          merge it into main.

          Layout:
            data/dukascopy/candles/${SYMBOL}/<TF>/year=YYYY.parquet
            data/dukascopy/candles/${SYMBOL}/manifest.json
            data/dukascopy/candles/${SYMBOL}/validation_report.json

          Built via dukascopy-node (M1 bid + ask -> mid + spread,
          resampled to M1 M3 M5 M15 M30 H1 H4 D1). Each candle row
          carries dataset_source = "dukascopy".

          Pull (codeload zip):
            https://codeload.github.com/${{ github.repository }}/zip/refs/heads/${BRANCH}
          EOF
          cd "$STAGE"
          git init -q -b "$BRANCH"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "data: refresh Dukascopy ${SYMBOL} candles ($(date -u +%Y-%m-%d))"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push --force origin "$BRANCH"
          echo "pushed candles to $BRANCH"
