name: build-dukascopy-data

# Manual-only ingestion of Dukascopy XAUUSD ticks -> candles.
#
# Two modes:
#   ticks_only  - download .bi5 hourly tick files only and upload the raw/
#                 tree as the artifact. Decode + resample happen LOCALLY
#                 via scripts/build_dukascopy_candles.py.
#   candles     - full pipeline in CI: download -> decode + resample to
#                 8 timeframes -> validate. The candle parquet is then
#                 force-pushed to the sidecar branch named in
#                 `commit_to_branch` (default: data-dukascopy) so a
#                 sandbox that can only reach github.com can pull the
#                 result via codeload zip without manual steps.
#
# The sidecar branch is regenerable; never merge it into main.

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Dukascopy symbol (e.g. XAUUSD)"
        required: true
        default: "XAUUSD"
      mode:
        description: "candles (full pipeline + push to sidecar) | ticks_only (raw .bi5 only)"
        required: true
        default: "candles"
      years_back:
        description: "Years of history when start_date/end_date are blank"
        required: true
        default: "6"
      start_date:
        description: "UTC YYYY-MM-DD (optional; pairs with end_date)"
        required: false
        default: ""
      end_date:
        description: "UTC YYYY-MM-DD (optional; exclusive)"
        required: false
        default: ""
      workers:
        description: "Parallel download workers (Dukascopy rate-limits >8 with 403; default 6)"
        required: true
        default: "6"
      write_csv:
        description: "Also emit CSV copies of every timeframe (candles mode only)"
        required: true
        default: "false"
      chunk_by:
        description: "Chunk granularity for build step: year | quarter | month"
        required: true
        default: "year"
      commit_to_branch:
        description: "Push candles to this orphan branch (candles mode). Empty disables."
        required: false
        default: "data-dukascopy"

# Need write so the final step can force-push the sidecar branch.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow requests tqdm

      - name: Resolve date range
        id: range
        env:
          SD: ${{ github.event.inputs.start_date }}
          ED: ${{ github.event.inputs.end_date }}
          YB: ${{ github.event.inputs.years_back }}
        run: |
          set -e
          if [ -n "$SD" ] && [ -n "$ED" ]; then
            echo "use=explicit" >> "$GITHUB_OUTPUT"
            echo "start=$SD"   >> "$GITHUB_OUTPUT"
            echo "end=$ED"     >> "$GITHUB_OUTPUT"
            echo "Using explicit range: $SD -> $ED"
          else
            echo "use=relative" >> "$GITHUB_OUTPUT"
            echo "yb=$YB"       >> "$GITHUB_OUTPUT"
            echo "Using years_back=$YB (today minus YB years)"
          fi

      - name: Run Dukascopy pipeline
        env:
          SYMBOL:     ${{ github.event.inputs.symbol }}
          MODE:       ${{ github.event.inputs.mode }}
          WRITE_CSV:  ${{ github.event.inputs.write_csv }}
          CHUNK_BY:   ${{ github.event.inputs.chunk_by }}
          WORKERS:    ${{ github.event.inputs.workers }}
          USE:        ${{ steps.range.outputs.use }}
          START:      ${{ steps.range.outputs.start }}
          END:        ${{ steps.range.outputs.end }}
          YB:         ${{ steps.range.outputs.yb }}
        run: |
          set -e
          ARGS=(--symbol "$SYMBOL" --output-dir output/dukascopy --chunk-by "$CHUNK_BY" --workers "$WORKERS")
          if [ "$WRITE_CSV" = "true" ]; then ARGS+=(--write-csv); fi
          if [ "$MODE" = "ticks_only" ]; then ARGS+=(--ticks-only --keep-raw); fi
          if [ "$USE" = "explicit" ]; then
            ARGS+=(--start-date "$START" --end-date "$END")
          else
            ARGS+=(--years-back "$YB")
          fi
          echo "+ python scripts/run_dukascopy_pipeline.py ${ARGS[@]}"
          python scripts/run_dukascopy_pipeline.py "${ARGS[@]}"

      - name: Tree of output/dukascopy
        if: always()
        run: |
          echo "=== output/dukascopy contents (top 50) ==="
          find output/dukascopy -maxdepth 6 -type f -printf '%s\t%p\n' | sort | head -50
          echo "=== total size ==="
          du -sh output/dukascopy 2>/dev/null || true
          echo "=== manifest ==="
          if [ -f output/dukascopy/${{ github.event.inputs.symbol }}/manifest.json ]; then
            cat output/dukascopy/${{ github.event.inputs.symbol }}/manifest.json
          fi

      - name: Zip artifact (mode-aware)
        env:
          SYMBOL: ${{ github.event.inputs.symbol }}
          MODE:   ${{ github.event.inputs.mode }}
        run: |
          set -e
          if [ "$MODE" = "ticks_only" ]; then
            ZIP_NAME="${SYMBOL}_dukascopy_ticks.zip"
            (cd output/dukascopy && zip -r -q "../../${ZIP_NAME}" raw "${SYMBOL}/manifest.json")
          else
            ZIP_NAME="${SYMBOL}_dukascopy_candles.zip"
            (cd output/dukascopy && zip -r -q "../../${ZIP_NAME}" "${SYMBOL}")
          fi
          ls -la "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Final zip size: $(du -h "${ZIP_NAME}" | cut -f1)"

      - name: Upload main artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.symbol }}_dukascopy_${{ github.event.inputs.mode }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload manifest + logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.event.inputs.symbol }}_dukascopy_${{ github.event.inputs.mode }}_meta
          path: |
            output/dukascopy/${{ github.event.inputs.symbol }}/manifest.json
            output/dukascopy/${{ github.event.inputs.symbol }}/validation_report.json
            output/dukascopy/download_log.csv
          if-no-files-found: warn
          retention-days: 30

      - name: Force-push candles to sidecar branch
        if: ${{ github.event.inputs.mode == 'candles' && github.event.inputs.commit_to_branch != '' }}
        env:
          BRANCH: ${{ github.event.inputs.commit_to_branch }}
          SYMBOL: ${{ github.event.inputs.symbol }}
          REPO:   ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          STAGE=/tmp/sidecar
          rm -rf "$STAGE"
          mkdir -p "$STAGE/data/dukascopy/candles"
          cp -r "output/dukascopy/${SYMBOL}" "$STAGE/data/dukascopy/candles/"
          find "$STAGE" -type f -name "${SYMBOL}_*.parquet" \
            ! -name "year=*" -size +95M -print -delete || true
          cat > "$STAGE/README.md" <<EOF
          # data-dukascopy (regenerable sidecar)

          This branch is force-replaced by the build-dukascopy-data
          GitHub Actions workflow on every refresh. It is **not** a
          code branch — do not merge it into main.

          Layout:
            data/dukascopy/candles/${SYMBOL}/<TF>/year=YYYY.parquet
            data/dukascopy/candles/${SYMBOL}/manifest.json
            data/dukascopy/candles/${SYMBOL}/validation_report.json

          Each candle row carries dataset_source = "dukascopy". Pull via:
            https://codeload.github.com/${{ github.repository }}/zip/refs/heads/${BRANCH}
          or per-file
            https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/<path>
          EOF
          cd "$STAGE"
          git init -q -b "$BRANCH"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "data: refresh Dukascopy ${SYMBOL} candles ($(date -u +%Y-%m-%d))"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push --force origin "$BRANCH"
          echo "pushed candles to $BRANCH"
