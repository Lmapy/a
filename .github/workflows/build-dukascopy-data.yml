name: build-dukascopy-data

# Manual-only ingestion of Dukascopy XAUUSD candles via the
# dukascopy-node Node.js library (which handles Dukascopy's per-IP rate
# limiting). The Python downloader path is kept as a fallback for
# ticks_only mode.
#
# Modes:
#   candles      [default]  fetch M1 bid + ask via dukascopy-node, combine
#                           into mid OHLC + spread, resample to all 8
#                           timeframes, force-push to data-dukascopy.
#   ticks_only              fetch raw .bi5 via the in-house Python
#                           downloader and upload as artifact (for users
#                           who want to do their own decoding).

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Dukascopy symbol (e.g. XAUUSD)"
        required: true
        default: "XAUUSD"
      mode:
        description: "candles (default; uses dukascopy-node) | ticks_only (raw .bi5 only)"
        required: true
        default: "candles"
      years_back:
        description: "Years of history when start_date/end_date are blank"
        required: true
        default: "6"
      start_date:
        description: "UTC YYYY-MM-DD (optional; pairs with end_date)"
        required: false
        default: ""
      end_date:
        description: "UTC YYYY-MM-DD (optional; exclusive)"
        required: false
        default: ""
      workers:
        description: "Workers for the ticks_only Python downloader (ignored in candles mode)"
        required: true
        default: "6"
      commit_to_branch:
        description: "Push candles to this orphan branch (candles mode). Empty disables."
        required: false
        default: "data-dukascopy"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        if: ${{ github.event.inputs.mode == 'candles' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow requests tqdm

      - name: Install dukascopy-node (npm)
        if: ${{ github.event.inputs.mode == 'candles' }}
        run: |
          npm install -g dukascopy-node
          npx -y dukascopy-node --version || true

      - name: Resolve date range
        id: range
        env:
          SD: ${{ github.event.inputs.start_date }}
          ED: ${{ github.event.inputs.end_date }}
          YB: ${{ github.event.inputs.years_back }}
        run: |
          set -e
          if [ -n "$SD" ] && [ -n "$ED" ]; then
            START="$SD"; END="$ED"
            echo "Using explicit range: $START -> $END"
          else
            END="$(date -u +%Y-%m-%d)"
            START="$(date -u -d "${YB} years ago" +%Y-%m-%d)"
            echo "Using years_back=${YB}: $START -> $END"
          fi
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END"     >> "$GITHUB_OUTPUT"

      - name: Run candles pipeline (dukascopy-node + resample)
        if: ${{ github.event.inputs.mode == 'candles' }}
        env:
          SYMBOL: ${{ github.event.inputs.symbol }}
          START:  ${{ steps.range.outputs.start }}
          END:    ${{ steps.range.outputs.end }}
        run: |
          mkdir -p output/dukascopy
          bash scripts/run_dukascopy_node.sh "$SYMBOL" "$START" "$END" output/dukascopy

      - name: Run ticks_only pipeline (Python downloader)
        if: ${{ github.event.inputs.mode == 'ticks_only' }}
        env:
          SYMBOL:  ${{ github.event.inputs.symbol }}
          WORKERS: ${{ github.event.inputs.workers }}
          START:   ${{ steps.range.outputs.start }}
          END:     ${{ steps.range.outputs.end }}
        run: |
          python scripts/run_dukascopy_pipeline.py \
            --symbol "$SYMBOL" --output-dir output/dukascopy \
            --workers "$WORKERS" --ticks-only --keep-raw \
            --start-date "$START" --end-date "$END"

      - name: Tree of output/dukascopy
        if: always()
        run: |
          echo "=== output/dukascopy contents (top 80) ==="
          find output/dukascopy -maxdepth 6 -type f -printf '%s\t%p\n' | sort | head -80
          echo "=== total size ==="
          du -sh output/dukascopy 2>/dev/null || true
          echo "=== manifest ==="
          if [ -f "output/dukascopy/${{ github.event.inputs.symbol }}/manifest.json" ]; then
            cat "output/dukascopy/${{ github.event.inputs.symbol }}/manifest.json"
          fi

      - name: Zip artifact (mode-aware)
        env:
          SYMBOL: ${{ github.event.inputs.symbol }}
          MODE:   ${{ github.event.inputs.mode }}
        run: |
          set -e
          if [ "$MODE" = "ticks_only" ]; then
            ZIP_NAME="${SYMBOL}_dukascopy_ticks.zip"
            (cd output/dukascopy && zip -r -q "../../${ZIP_NAME}" raw "${SYMBOL}/manifest.json" 2>/dev/null) || true
          else
            ZIP_NAME="${SYMBOL}_dukascopy_candles.zip"
            (cd output/dukascopy && zip -r -q "../../${ZIP_NAME}" "${SYMBOL}")
          fi
          ls -la "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Final zip size: $(du -h "${ZIP_NAME}" | cut -f1)"

      - name: Upload main artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.symbol }}_dukascopy_${{ github.event.inputs.mode }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload manifest + logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.event.inputs.symbol }}_dukascopy_${{ github.event.inputs.mode }}_meta
          path: |
            output/dukascopy/${{ github.event.inputs.symbol }}/manifest.json
            output/dukascopy/${{ github.event.inputs.symbol }}/validation_report.json
            output/dukascopy/download_log.csv
          if-no-files-found: warn
          retention-days: 30

      - name: Force-push candles to sidecar branch
        if: ${{ github.event.inputs.mode == 'candles' && github.event.inputs.commit_to_branch != '' }}
        env:
          BRANCH: ${{ github.event.inputs.commit_to_branch }}
          SYMBOL: ${{ github.event.inputs.symbol }}
          REPO:   ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          STAGE=/tmp/sidecar
          rm -rf "$STAGE"
          mkdir -p "$STAGE/data/dukascopy/candles"
          cp -r "output/dukascopy/${SYMBOL}" "$STAGE/data/dukascopy/candles/"
          find "$STAGE" -type f -name "${SYMBOL}_*.parquet" \
            ! -name "year=*" -size +95M -print -delete || true
          cat > "$STAGE/README.md" <<EOF
          # data-dukascopy (regenerable sidecar)

          This branch is force-replaced by the build-dukascopy-data
          GitHub Actions workflow. It is not a code branch — do not
          merge it into main.

          Layout:
            data/dukascopy/candles/${SYMBOL}/<TF>/year=YYYY.parquet
            data/dukascopy/candles/${SYMBOL}/manifest.json
            data/dukascopy/candles/${SYMBOL}/validation_report.json

          Built via dukascopy-node (M1 bid + ask -> mid + spread,
          resampled to M1 M3 M5 M15 M30 H1 H4 D1). Each candle row
          carries dataset_source = "dukascopy".

          Pull (codeload zip):
            https://codeload.github.com/${{ github.repository }}/zip/refs/heads/${BRANCH}
          Per-file:
            https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/<path>
          EOF
          cd "$STAGE"
          git init -q -b "$BRANCH"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "data: refresh Dukascopy ${SYMBOL} candles ($(date -u +%Y-%m-%d))"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push --force origin "$BRANCH"
          echo "pushed candles to $BRANCH"
