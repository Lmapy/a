# CBR-style gold scalp default configuration.
#
# This is a MECHANICAL APPROXIMATION of the public TomTrades / CBR
# scalp model — not the proprietary system. See
# docs/CBR_SCALP.md for the full description and known limitations.
#
# Defaults match the user's brief:
#   * Australia/Melbourne timezone
#   * Asia "second hour" execution window 10:00-11:00
#   * Previous-1H direction bias
#   * 20-bar expansion lookback, ≥0.65 directional candle ratio
#   * Sweep OR rebalance trigger
#   * 50% retracement limit entry
#   * Recent-swing stop, 1.5R fixed target
#   * 1 contract fixed quantity (so R-numbers are interpretable)

name: cbr_gold_scalp
symbol: XAUUSD
primary_timeframe: M1
bias_timeframe: H1

start_date: null      # null = use full available data window
end_date: null
output_dir: results/cbr_gold_scalp

session:
  timezone: Australia/Melbourne
  asia_session_start: "09:00"
  asia_session_end:   "12:00"
  execution_window_start: "10:00"
  execution_window_end:   "11:00"
  allow_setup_outside_execution: true
  allow_entry_outside_execution: false

htf_bias:
  bias_mode: PREVIOUS_1H_CANDLE_DIRECTION
  ema_length: 20
  wick_body_threshold: 0.55

dxy:
  dxy_mode: OFF                       # DXY not in default Dukascopy dataset
  dxy_symbol: DXY
  dxy_timeframe: H1
  ema_length: 20
  require_inverse_confirmation: true

expansion:
  expansion_lookback_bars: 20
  min_directional_candle_percent: 0.65
  min_net_move_atr_multiple: 1.0
  atr_length: 14
  expansion_measurement_mode: CLOSE_TO_CLOSE
  minimum_total_range_atr_multiple: 1.0
  quality_score_threshold: null       # null = log only, no filter

trigger:
  trigger_mode: SWEEP_OR_REBALANCE
  rebalance_tolerance_ticks: 2
  rebalance_tolerance_atr_fraction: 0.25
  require_midpoint_touch: true
  max_bars_after_expansion: 30
  max_bars_between_trigger_and_msb: 20

structure:
  pivot_left: 2
  pivot_right: 2
  structure_break_mode: CLOSE_THROUGH
  require_structure_shift_after_sweep_or_rebalance: true

entry:
  entry_mode: LIMIT_50_RETRACE
  custom_retrace: 0.5
  entry_expiry_bars: 10
  min_entry_distance_ticks: 0
  max_entry_distance_ticks: 99999
  one_trade_per_session: true
  max_trades_per_day: 2

stop_target:
  stop_mode: RECENT_SWING
  target_mode: FIXED_R_MULTIPLE
  risk_reward: 1.5
  stop_buffer_ticks: 1
  atr_stop_multiple: 1.0
  custom_stop_ticks: 200

risk:
  position_size_mode: FIXED_QTY
  fixed_qty: 1.0
  fixed_risk_currency: 250.0
  risk_percent: 0.5
  initial_equity: 50000.0
  tick_size: 0.10                     # XAUUSD spot tick on Dukascopy
  tick_value: 0.10
  break_even_after_r: null
  partial_tp_enabled: false
  tp1_r: 1.0
  tp1_percent: 0.5
  trail_after_tp1: false

engine:
  same_bar_entry_exit: false
  ambiguous_bar_resolution: CONSERVATIVE
  market_entry_fill_convention: next_open
